<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sin conexión — SCAF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e6edf3;
    }
    p {
      font-size: 0.95rem;
      color: #8b949e;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #2f81f7;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .btn:hover { background: #1a6fd6; }
    .hint {
      font-size: 0.8rem;
      color: #484f58;
      margin-top: 24px;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f85149; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body>
  <img src="/icons/icon-192x192.png" class="icon" alt="SCAF" />
  <h1>Sin conexión a internet</h1>
  <p>
    <span class="dot"></span>No hay red disponible en este momento.<br />
    Los datos que ya cargaste siguen disponibles mientras navegas.
  </p>
  <button class="btn" onclick="window.location.reload()">
    🔄 Reintentar conexión
  </button>
  <br />
  <a class="btn" href="/" style="background:#21262d; border: 1px solid #30363d;">
    ← Volver al inicio
  </a>
  <p class="hint">SCAF guarda tus datos automáticamente cuando vuelva la conexión.</p>
</body>
</html>
